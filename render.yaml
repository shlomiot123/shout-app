services:
  - type: web
    name: shout-app
    runtime: node
    region: frankfurt
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/categories

  - type: web
    name: shout-mobile-web
    runtime: static
    region: frankfurt
    buildCommand: cd mobile && npm install --legacy-peer-deps && npx expo export --platform web
    staticPublishPath: mobile/dist
    envVars:
      - key: EXPO_PUBLIC_API_URL
        value: https://shout-app.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
